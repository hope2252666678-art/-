<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI Support Widget</title>
    <style>
        /* 右下角聊天泡泡樣式 */
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-family: Arial, sans-serif;
            z-index: 1000;
        }
        .chat-bubble {
            width: 60px;
            height: 60px;
            background: #007bff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .chat-box {
            display: none;
            width: 350px;
            height: 450px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: absolute;
            bottom: 75px;
            right: 0;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header { background: #007bff; color: white; padding: 15px; display: flex; justify-content: space-between; }
        .chat-body { padding: 15px; flex: 1; overflow-y: auto; }
        .lang-btn { cursor: pointer; padding: 5px; margin-right: 5px; border: 1px solid #ccc; border-radius: 3px; }
        .faq-item { background: #f8f9fa; padding: 8px; margin-bottom: 8px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .faq-item:hover { background: #e2e6ea; }
    </style>
</head>
<body>

<div class="chat-widget">
    <!-- 聊天泡泡圖示 -->
    <div class="chat-bubble" onclick="toggleChat()">💬</div>
    
    <!-- 聊天視窗主體 -->
    <div class="chat-box" id="chatBox">
        <div class="chat-header">
            <span>AI Support (Multi-Language)</span>
            <div>
                <span class="lang-btn" onclick="switchLang('zh')">🇹🇼 中</span>
                <span class="lang-btn" onclick="switchLang('en')">🇺🇸 EN</span>
                <span class="lang-btn" onclick="switchLang('ja')">🇯🇵 日</span>
            </div>
        </div>
        <div class="chat-body" id="chatBody">
            <!-- QA 內容會由 JS 動態動態渲染 -->
        </div>
    </div>
</div>

<script>
    // 1. 三語 QA 資料庫設定
    const qaData = {
        zh: [
            { q: "如何安裝輔助程式？", a: "請下載解壓縮後，以系統管理員身份執行 main.exe。", langCode: "zh-TW" },
            { q: "防毒軟體誤報怎麼辦？", a: "本程式無毒，因涉及自動化操作會被誤標，請加入信任區。", langCode: "zh-TW" }
        ],
        en: [
            { q: "How to install the helper tool?", a: "Download the zip, extract it, and run main.exe as Administrator.", langCode: "en-US" },
            { q: "Antivirus blocked it, what should I do?", a: "This is a false positive. Please add our folder to your antivirus exclusion list.", langCode: "en-US" }
        ],
        ja: [
            { q: "インストール方法は？", a: "ファイルを解凍し、main.exeを管理者として実行してください。", langCode: "ja-JP" },
            { q: "ウイルス対策ソフトに検知されました", a: "これは誤検知です。安心してお使いいただくため、除外リストに追加してください。", langCode: "ja-JP" }
        ]
    };

    let currentLang = 'en'; // 預設英文

    function toggleChat() {
        const box = document.getElementById('chatBox');
        box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
        if(box.style.display === 'flex') renderQA();
    }

    function switchLang(lang) {
        currentLang = lang;
        renderQA();
    }

    // 2. 渲染 QA 列表與語音播放綁定
    function renderQA() {
        const body = document.getElementById('chatBody');
        body.innerHTML = `<h4>FAQ (${currentLang.toUpperCase()})</h4>`;
        
        qaData[currentLang].forEach(item => {
            const div = document.createElement('div');
            div.className = 'faq-item';
            div.innerText = item.q;
            div.onclick = () => {
                alert(item.a); // 畫面上顯示答案
                speak(item.a, item.langCode); // 功能一：播放語音
            };
            body.appendChild(div);
        });

        // 這裡後續可以加上「輸入對話代號」與「我要留言」的 HTML 表單
    }

    // 功能一的核心：網頁語音輸出 (TTS)
    function speak(text, lang) {
        // 先停止之前的播放，避免重疊
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = lang;
        window.speechSynthesis.speak(utterance);
    }
</script>
</body>
</html>
